<!doctype html>
<html lang="en" ng-app="dmsApp">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function(){
        try {
          var t = localStorage.getItem('dmsTheme')
          if (t !== 'light' && t !== 'dark') {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark'
          }
          document.documentElement.classList.add('theme-' + t)
        } catch(e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
      :root {
        --accent:    #4f6ef7;
        --accent-h:  #3b5bdb;
        --bg:        #0c0c0c;
        --surface:   #141414;
        --card:      #1c1c1c;
        --card-2:    #222222;
        --border:    #2e2e2e;
        --border-2:  #3a3a3a;
        --muted:     #6b7280;
        --muted-2:   #9ca3af;
        --text:      #f0f0f0;
        --text-2:    #c9c9c9;
      }
      html.theme-light {
        --accent:    #4f6ef7;
        --accent-h:  #3b5bdb;
        --bg:        #f6f7fb;
        --surface:   #f1f3f7;
        --card:      #ffffff;
        --card-2:    #f5f6fa;
        --border:    #e4e7ee;
        --border-2:  #d7dbe6;
        --muted:     #6b7280;
        --muted-2:   #4b5563;
        --text:      #111827;
        --text-2:    #374151;
      }
      *, html, body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; box-sizing: border-box; }
      body { background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

      i[data-lucide] { display: inline-flex; align-items: center; justify-content: center; pointer-events: none; }
      i[data-lucide] svg, [data-lucide] svg { pointer-events: none !important; }
      button svg, a svg { pointer-events: none; }

      /* Layout */
      .sidebar { background: var(--surface); border-right: 1px solid var(--border); width: 220px; flex-shrink: 0; }
      .topbar  { background: rgba(20,20,20,0.95); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
      html.theme-light .topbar { background: rgba(248,250,252,0.95); }

      /* Cards */
      .card  { background: var(--card);   border: 1px solid var(--border);   border-radius: 8px; }
      .card2 { background: var(--card-2); border: 1px solid var(--border-2); border-radius: 6px; }

      /* Nav */
      .nav-item {
        display: flex; align-items: center; gap: 10px;
        padding: 7px 10px; border-radius: 6px;
        font-size: 13.5px; font-weight: 500; color: var(--muted-2);
        text-decoration: none; transition: background 0.1s, color 0.1s;
        cursor: pointer;
      }
      .nav-item:hover  { background: rgba(255,255,255,0.07); color: var(--text); }
      .nav-item.active { background: rgba(79,110,247,0.15);  color: #93a8ff; }
      html.theme-light .nav-item:hover  { background: rgba(15,23,42,0.06); color: var(--text); }
      html.theme-light .nav-item.active { background: rgba(79,110,247,0.12); color: #3b5bdb; }
      .nav-item i[data-lucide] svg { width: 16px; height: 16px; }

      /* Buttons */
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        font-size: 13px; font-weight: 500; border-radius: 6px;
        padding: 0 14px; height: 34px; border: none; cursor: pointer;
        transition: background 0.12s, opacity 0.12s; white-space: nowrap;
        text-decoration: none;
      }
      .btn i[data-lucide] svg { width: 14px; height: 14px; }
      .btn-primary   { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-h); }
      .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
      .btn-secondary { background: rgba(255,255,255,0.07); color: var(--text-2); border: 1px solid var(--border-2); }
      .btn-secondary:hover { background: rgba(255,255,255,0.12); color: var(--text); }
      html.theme-light .btn-secondary { background: #f3f4f6; color: var(--text-2); border: 1px solid var(--border-2); }
      .btn-danger    { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
      .btn-danger:hover { background: rgba(239,68,68,0.2); }
      .btn-ghost     { background: transparent; color: var(--muted-2); border: 1px solid var(--border); }
      .btn-ghost:hover { background: rgba(255,255,255,0.06); color: var(--text); }
      .btn-sm  { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 5px; }
      .btn-sm i[data-lucide] svg { width: 13px; height: 13px; }
      .btn-icon { width: 32px; height: 32px; padding: 0; }
      .btn-icon.btn-sm { width: 28px; height: 28px; }

      /* Inputs */
      .input {
        display: block;
        background: var(--card-2); border: 1px solid var(--border-2);
        border-radius: 6px; color: var(--text); font-size: 13.5px;
        padding: 8px 12px; height: 36px; width: 100%; outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
        font-family: inherit; box-sizing: border-box;
        -webkit-appearance: none; appearance: none;
      }
      .input::placeholder { color: var(--muted); }
      .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,110,247,0.15); }
      /* alias */
      .input-field { display: block; background: var(--card-2); border: 1px solid var(--border-2); border-radius: 6px; color: var(--text); font-size: 13.5px; padding: 8px 12px; height: 36px; width: 100%; outline: none; transition: border-color 0.15s, box-shadow 0.15s; font-family: inherit; box-sizing: border-box; -webkit-appearance: none; appearance: none; }
      .input-field::placeholder { color: var(--muted); }
      .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,110,247,0.15); }

      /* Badges */
      .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; }
      .badge-blue  { background: rgba(79,110,247,0.12); color: #93a8ff; border: 1px solid rgba(79,110,247,0.25); }
      .badge-gray  { background: rgba(255,255,255,0.06); color: var(--muted-2); border: 1px solid var(--border-2); }
      .badge-green { background: rgba(34,197,94,0.1); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
      .badge-red   { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }

      /* Table */
      table { width: 100%; border-collapse: collapse; }
      thead tr { border-bottom: 1px solid var(--border); }
      tbody tr { border-bottom: 1px solid rgba(46,46,46,0.8); transition: background 0.1s; }
      tbody tr:last-child { border-bottom: none; }
      tbody tr:hover { background: rgba(255,255,255,0.025); }
      html.theme-light tbody tr { border-bottom: 1px solid rgba(226,232,240,0.9); }
      html.theme-light tbody tr:hover { background: rgba(15,23,42,0.03); }
      th { text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; padding: 10px 16px; }
      td { padding: 11px 16px; font-size: 13.5px; color: var(--text-2); vertical-align: middle; }

      /* Skeleton */
      .skeleton { background: linear-gradient(90deg, #222 25%, #2a2a2a 50%, #222 75%); background-size: 400% 100%; animation: shimmer 1.4s ease infinite; border-radius: 4px; }
      html.theme-light .skeleton { background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%); background-size: 400% 100%; }
      @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }

      /* Misc */
      .fade-in { animation: fadeIn 0.18s ease-out; }
      @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 99px; }
      html.theme-light ::-webkit-scrollbar-thumb { background: #cbd5e1; }
      select option { background: #1c1c1c; color: #f0f0f0; }
      html.theme-light select option { background: #ffffff; color: #111827; }
      a { text-decoration: none; }
      /* Hard override — prevent Tailwind preflight from expanding inputs */
      input.input, input.input-field { height: 36px !important; max-height: 36px !important; overflow: hidden; }
      select.input, select.input-field { height: 36px !important; }
      label { cursor: pointer; }

      /* Section label */
      .section-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 12px 10px 4px; }

      /* Stat card */
      .stat-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .stat-icon svg { width: 18px; height: 18px; }
    </style>
  </head>
  <body>
    <div ng-controller="ShellCtrl" class="min-h-screen flex">

      <!-- ── Sidebar ── -->
      <aside ng-if="showAppChrome"
        class="sidebar fixed z-30 md:static h-screen flex flex-col transition-transform duration-200"
        ng-class="{'translate-x-0': sidebarOpen, '-translate-x-full md:translate-x-0': !sidebarOpen}">

        <!-- Logo -->
        <div class="flex items-center gap-2.5 px-4 h-14 border-b" style="border-color:var(--border)">
          <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0" style="background:var(--accent)">
            <i data-lucide="file-text" style="color:#fff; width:15px; height:15px"></i>
          </div>
          <span class="font-semibold text-sm tracking-tight" style="color:var(--text)">DocManager</span>
          <button type="button" class="md:hidden ml-auto btn btn-ghost btn-icon btn-sm" ng-click="sidebarOpen=false">
            <i data-lucide="x"></i>
          </button>
        </div>

        <!-- Nav -->
        <nav class="flex-1 px-2 py-3 space-y-0.5 overflow-y-auto">
          <a href="#/" class="nav-item" ng-class="{'active': isActive('/')}">
            <i data-lucide="layout-dashboard"></i> Dashboard
          </a>
          <a href="#/documents" class="nav-item" ng-class="{'active': isActive('/documents')}">
            <i data-lucide="files"></i> Documents
          </a>
          <a href="#/upload" class="nav-item" ng-class="{'active': isActive('/upload')}">
            <i data-lucide="upload"></i> Upload
          </a>
          <div ng-if="currentUser.role==='admin'" class="section-label">Admin</div>
          <a href="#/users" ng-if="currentUser.role==='admin'" class="nav-item" ng-class="{'active': isActive('/users')}">
            <i data-lucide="users"></i> Users
          </a>
          <a href="#/reports" ng-if="currentUser.role==='admin'" class="nav-item" ng-class="{'active': isActive('/reports')}">
            <i data-lucide="bar-chart-2"></i> Reports
          </a>
        </nav>

        <!-- User -->
        <div class="px-3 py-3 border-t" style="border-color:var(--border)">
          <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold flex-shrink-0"
              style="background:rgba(79,110,247,0.2); color:#93a8ff; border:1px solid rgba(79,110,247,0.3)">
              {{(currentUser.name||'G').charAt(0).toUpperCase()}}
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-xs font-semibold truncate" style="color:var(--text)">{{currentUser.name||'Guest'}}</div>
              <div class="text-xs capitalize" style="color:var(--muted)">{{currentUser.role}}</div>
            </div>
            <button type="button" class="btn btn-ghost btn-icon btn-sm" ng-click="logout()" title="Sign out">
              <i data-lucide="log-out"></i>
            </button>
          </div>
        </div>
      </aside>

      <!-- ── Main ── -->
      <div class="flex-1 min-w-0 flex flex-col">

        <!-- Topbar -->
        <header ng-if="showAppChrome" class="topbar sticky top-0 z-20">
          <div class="px-5 h-14 flex items-center gap-4">
            <button type="button" class="md:hidden btn btn-ghost btn-icon btn-sm" ng-click="sidebarOpen=true">
              <i data-lucide="menu"></i>
            </button>
            <!-- Breadcrumb -->
            <div class="flex items-center gap-1.5 text-sm min-w-0">
              <span style="color:var(--muted)">{{breadcrumbs.section}}</span>
              <i data-lucide="chevron-right" style="width:14px;height:14px;color:var(--muted);flex-shrink:0"></i>
              <span class="font-medium truncate" style="color:var(--text)">{{breadcrumbs.page}}</span>
            </div>
            <!-- Search -->
            <div class="hidden md:flex flex-1 max-w-xs ml-auto relative">
              <i data-lucide="search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted);pointer-events:none"></i>
              <input ng-model="searchInput" ng-change="search(searchInput)"
                placeholder="Search documents…" aria-label="Search documents"
                class="input" style="padding-left:32px; font-size:13px" />
            </div>
            <!-- Upload CTA -->
            <a href="#/upload" class="btn btn-primary btn-sm hidden sm:inline-flex ml-2">
              <i data-lucide="plus"></i> Upload
            </a>
            <!-- Theme toggle -->
            <button type="button" class="btn btn-ghost btn-icon btn-sm" ng-click="toggleTheme()" title="Toggle theme">
              <i ng-attr-data-lucide="{{theme === 'dark' ? 'sun' : 'moon'}}"></i>
            </button>
          </div>
        </header>

        <main class="fade-in flex-1" ng-class="showAppChrome ? 'p-5' : 'p-0'" ng-view></main>
      </div>

      <!-- Mobile overlay -->
      <div ng-if="showAppChrome && sidebarOpen" class="fixed inset-0 z-20 bg-black/60 md:hidden" ng-click="sidebarOpen=false"></div>
    </div>

    <!-- Toasts -->
    <div class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none" style="width:290px">
      <div ng-repeat="t in toasts track by t.id"
        class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium"
        style="box-shadow:0 4px 24px rgba(0,0,0,0.6)"
        ng-class="{
          'bg-[#0d1f0d] text-green-300 border border-green-900/60': t.type==='success',
          'bg-[#1f0d0d] text-red-300 border border-red-900/60':   t.type==='error',
          'bg-[#0d1020] text-blue-300 border border-blue-900/60':  t.type==='info'
        }">
        <i ng-if="t.type==='success'" data-lucide="check-circle" style="width:16px;height:16px;flex-shrink:0"></i>
        <i ng-if="t.type==='error'"   data-lucide="x-circle"     style="width:16px;height:16px;flex-shrink:0"></i>
        <i ng-if="t.type==='info'"    data-lucide="info"          style="width:16px;height:16px;flex-shrink:0"></i>
        {{t.msg}}
      </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
    <script src="src/app.js"></script>
    <script src="src/services/api.service.js"></script>
    <script src="src/services/toast.service.js"></script>
    <script src="src/controllers/auth.controller.js"></script>
    <script src="src/controllers/dashboard.controller.js"></script>
    <script src="src/controllers/documents.controller.js"></script>
    <script src="src/controllers/upload.controller.js"></script>
    <script src="src/controllers/users.controller.js"></script>
    <script src="src/controllers/reports.controller.js"></script>
    <!-- Init Lucide after Angular renders -->
    <script>
      // Set pointer-events:none on all lucide SVGs so ng-click always fires on the parent button
      if (window.lucide) {
        var _orig = lucide.createIcons.bind(lucide)
        lucide.createIcons = function(opts) {
          _orig(opts)
          document.querySelectorAll('i[data-lucide] svg, [data-lucide] svg').forEach(function(svg){
            svg.style.pointerEvents = 'none'
          })
        }
      }
      document.addEventListener('DOMContentLoaded', function() {
        if (window.lucide) lucide.createIcons()
      })
      document.addEventListener('click', function(){
        setTimeout(function(){
          if (window.lucide) lucide.createIcons()
        }, 60)
      })
    </script>
  </body>
</html>
