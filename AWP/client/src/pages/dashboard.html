<div class="space-y-5">

  <!-- Stats -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">

    <div class="card p-4 flex items-center gap-4">
      <div class="stat-icon" style="background:rgba(79,110,247,0.12);border:1px solid rgba(79,110,247,0.2)">
        <i data-lucide="file-text" style="color:#93a8ff;width:18px;height:18px"></i>
      </div>
      <div>
        <p class="text-xs font-medium mb-0.5" style="color:var(--muted)">Total Documents</p>
        <p class="text-2xl font-bold" style="color:var(--text)">{{stats.total}}</p>
      </div>
    </div>

    <div class="card p-4 flex items-center gap-4">
      <div class="stat-icon" style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2)">
        <i data-lucide="users" style="color:#86efac;width:18px;height:18px"></i>
      </div>
      <div>
        <p class="text-xs font-medium mb-0.5" style="color:var(--muted)">Total Users</p>
        <p class="text-2xl font-bold" style="color:var(--text)">{{stats.users}}</p>
      </div>
    </div>

    <div class="card p-4 flex items-center gap-4">
      <div class="stat-icon" style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.2)">
        <i data-lucide="activity" style="color:#fde68a;width:18px;height:18px"></i>
      </div>
      <div>
        <p class="text-xs font-medium mb-0.5" style="color:var(--muted)">Recent Uploads</p>
        <p class="text-2xl font-bold" style="color:var(--text)">{{stats.recent.length}}</p>
      </div>
    </div>

  </div>

  <!-- Chart + Feed -->
  <div class="grid md:grid-cols-3 gap-4">

    <div class="card p-4 md:col-span-2">
      <p class="text-xs font-semibold uppercase tracking-widest mb-4" style="color:var(--muted)">Uploads per Day</p>
      <canvas id="uploadChart" height="120"></canvas>
    </div>

    <div class="card p-4">
      <p class="text-xs font-semibold uppercase tracking-widest mb-4" style="color:var(--muted)">Recent Activity</p>
      <div ng-if="loading" class="space-y-3">
        <div class="h-3 skeleton w-full"></div>
        <div class="h-3 skeleton w-4/5"></div>
        <div class="h-3 skeleton w-3/5"></div>
        <div class="h-3 skeleton w-4/5"></div>
      </div>
      <ul ng-if="!loading" class="space-y-3">
        <li ng-repeat="r in stats.recent" class="flex items-start gap-2.5">
          <div class="w-6 h-6 rounded flex items-center justify-center flex-shrink-0 mt-0.5"
            style="background:rgba(79,110,247,0.1);border:1px solid rgba(79,110,247,0.2)">
            <i data-lucide="file" style="color:#93a8ff;width:11px;height:11px"></i>
          </div>
          <div class="min-w-0">
            <p class="text-xs font-medium truncate" style="color:var(--text)">{{r.title}}</p>
            <p class="text-xs" style="color:var(--muted)">{{r.createdAt | date:'mediumDate'}}</p>
          </div>
        </li>
        <li ng-if="!stats.recent.length" class="text-xs" style="color:var(--muted)">No activity yet.</li>
      </ul>
    </div>

  </div>
</div>
