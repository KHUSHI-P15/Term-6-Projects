<div class="space-y-4">

  <div class="flex items-center justify-between">
    <h1 class="text-base font-semibold" style="color:var(--text)">Users</h1>
    <span class="badge badge-blue">
      <i data-lucide="shield" style="width:11px;height:11px"></i> Admin Only
    </span>
  </div>

  <div class="card overflow-hidden">

    <!-- Skeleton -->
    <div ng-if="loading" class="p-4 space-y-3">
      <div class="h-10 skeleton"></div>
      <div class="h-10 skeleton"></div>
      <div class="h-10 skeleton"></div>
    </div>

    <!-- Table -->
    <div ng-if="!loading" class="overflow-x-auto">
      <table>
        <thead>
          <tr>
            <th><div class="flex items-center gap-1.5"><i data-lucide="user" style="width:12px;height:12px"></i> Name</div></th>
            <th><div class="flex items-center gap-1.5"><i data-lucide="mail" style="width:12px;height:12px"></i> Email</div></th>
            <th>Role</th>
            <th>Change Role</th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="u in users track by u._id">
            <td>
              <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold flex-shrink-0"
                  style="background:rgba(79,110,247,0.15);color:#93a8ff;border:1px solid rgba(79,110,247,0.25)">
                  {{(u.name||'?').charAt(0).toUpperCase()}}
                </div>
                <span class="font-medium" style="color:var(--text)">{{u.name}}</span>
              </div>
            </td>
            <td>{{u.email}}</td>
            <td>
              <span class="badge" ng-class="u.role==='admin' ? 'badge-blue' : 'badge-gray'">
                <i ng-if="u.role==='admin'" data-lucide="star"  style="width:10px;height:10px"></i>
                <i ng-if="u.role!=='admin'" data-lucide="user"  style="width:10px;height:10px"></i>
                {{u.role}}
              </span>
            </td>
            <td>
              <div class="flex items-center gap-2">
                <select ng-model="u.nextRole" ng-init="u.nextRole=u.role"
                  class="input" style="width:auto;height:30px;padding:0 8px;font-size:12px">
                  <option value="user">User</option>
                  <option value="admin">Admin</option>
                </select>
                <button type="button" class="btn btn-primary btn-sm" ng-click="changeRole(u, u.nextRole)">
                  Update
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
